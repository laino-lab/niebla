<html>
<head>
<meta charset="UTF-8">

<title>Modelo lingüístico de Navarra: D, A o G</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Noto+Sans+Arabic:wght@300;400;500&display=swap');
:root{
  --ink:#1a1208;--paper:#f5f0e8;--muted:#8a7a68;
  --border:#d4c9b0;--accent:#c8390a;
  --D:#1a5c38;--A:#3d5a80;--G:#b5451b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);min-height:100vh;
  font-family:'IBM Plex Sans',sans-serif;font-weight:300;}

/* ── PANTAILA NAGUSIA ── */
#lang-screen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:2rem;text-align:center;
}
#lang-screen h1{
  font-family:'Playfair Display',serif;font-weight:400;
  font-size:1.6rem;line-height:1.3;margin-bottom:0.5rem;max-width:480px;
}
#lang-screen p{
  font-size:0.8rem;color:var(--muted);margin-bottom:3rem;
  font-family:'IBM Plex Mono',monospace;letter-spacing:0.05em;
}
.lang-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;
  max-width:400px;width:100%;
}
.lang-btn{
  border:2px solid var(--ink);background:white;
  padding:1.1rem 1rem;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:0.85rem;
  font-weight:500;letter-spacing:0.08em;color:var(--ink);
  transition:all 0.15s;
}
.lang-btn:hover{background:var(--ink);color:var(--paper);}
.lang-btn.arab-btn{font-family:'Noto Sans Arabic',sans-serif;
  letter-spacing:0;font-size:1rem;}
.lang-sub{font-size:0.88rem;color:var(--ink);margin-top:1.5rem;
  font-family:'Playfair Display',serif;font-style:italic;max-width:360px;}

/* ── APP ── */
#app{display:none;max-width:580px;margin:0 auto;padding:2.5rem 1.25rem 5rem;}

.back-btn{background:none;border:none;color:var(--muted);
  font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;
  text-transform:uppercase;cursor:pointer;margin-bottom:1.5rem;
  padding:0;display:block;}
.back-btn:hover{color:var(--ink);}

h1.app-h1{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:400;
  line-height:1.2;margin-bottom:0.4rem;}
.intro{font-size:0.82rem;color:var(--muted);line-height:1.65;margin-bottom:2rem;}

.gal-q{font-size:1.05rem;font-weight:400;margin-bottom:1rem;}
.opts{display:flex;flex-direction:column;gap:0.4rem;}
.opt{border:1.5px solid var(--border);background:white;padding:0.8rem 1rem;
  cursor:pointer;text-align:left;font-size:0.88rem;font-weight:300;
  color:var(--ink);transition:all 0.12s;
  display:grid;grid-template-columns:14px 1fr;gap:0.75rem;align-items:center;}
.opt:hover{border-color:var(--ink);transform:translateY(-1px);}
.opt.sel{border-color:var(--ink);background:var(--ink);color:var(--paper);}
.opt-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);}
.opt.sel .opt-dot{background:var(--paper);border-color:var(--paper);}
.opt-nom{font-weight:400;display:block;}
.opt-sub{font-size:0.72rem;color:var(--muted);margin-top:0.1rem;display:block;}
.opt.sel .opt-sub{color:#aaa;}

.calc-btn{border:2px solid var(--ink);background:var(--ink);color:var(--paper);
  padding:0.75rem 2rem;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;
  letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;
  margin-top:1.25rem;transition:all 0.15s;}
.calc-btn:hover{background:var(--accent);border-color:var(--accent);}
.calc-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* EMAITZA */
.em{display:none;padding-top:2rem;border-top:2px solid var(--ink);margin-top:0.5rem;}
.em-k{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem;}
.em-t{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:1.75rem;line-height:1.3;}

.ek3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0.6rem;margin-bottom:1.5rem;}
.ek{background:white;border:1.5px solid var(--border);padding:1.1rem 1rem;position:relative;}
.ek.top{border-width:2px;}
.ek-tick{position:absolute;top:0.6rem;right:0.7rem;font-size:1rem;color:var(--D);}
.ek-e{font-family:'IBM Plex Mono',monospace;font-size:0.9rem;letter-spacing:0.05em;
  text-transform:uppercase;margin-bottom:0.5rem;font-weight:500;}
.ek-sol{font-family:'Playfair Display',serif;font-size:1.6rem;line-height:1;margin-bottom:0.2rem;}
.ek-any{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--muted);}

.diff{border-left:3px solid var(--D);background:white;
  padding:1rem 1.25rem;margin-bottom:1.5rem;line-height:1.8;}
.diff-num{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--D);}
.diff-exp{font-size:0.8rem;color:var(--muted);}

.sec-t{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem;}
.lur3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0.5rem;margin-bottom:1.5rem;}
.lc{background:white;border:0.5px solid var(--border);padding:0.75rem 0.7rem;}
.lc-e{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:0.5rem;}
.lc-row{display:flex;justify-content:space-between;
  font-family:'IBM Plex Mono',monospace;font-size:0.62rem;margin-bottom:2px;}
.lc-lur{color:var(--muted);}

.reset-btn{border:2px solid var(--ink);background:none;color:var(--ink);
  padding:0.65rem 1.5rem;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
  margin-bottom:2.5rem;}
.reset-btn:hover{background:var(--ink);color:var(--paper);}

.oharrak{border-top:1px solid var(--border);padding-top:1.5rem;}
.oh-tit{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
.oh-bloke{margin-bottom:1.25rem;}
.oh-sub{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;font-weight:500;
  color:var(--ink);margin-bottom:0.35rem;}
.oh-txt{font-size:0.78rem;color:var(--muted);line-height:1.7;}
.oh-txt strong{color:var(--ink);font-weight:500;}

/* RTL */
.rtl{direction:rtl;text-align:right;}
.rtl .opt{grid-template-columns:1fr 14px;}
.rtl .diff{border-left:none;border-right:3px solid var(--D);}
.rtl .ek-tick{right:auto;left:0.7rem;}
.rtl *:not(.ek-sol):not(.ek-e):not(.ek-any):not(.lc-e):not(.oh-tit):not(.sec-t):not(.em-k):not(.em-t):not(.ek-tick):not(.diff-num){
  font-family:'Noto Sans Arabic',sans-serif !important;
}
</style>
</head>

      {k:"elebietan",   n:"ثنائي اللغة — باسكي وإسباني",s:"تُستخدم اللغتان في المنزل"},
      {k:"gaztelaniaz", n:"الإسبانية",s:"نافارا، إسبانيا أو أمريكا اللاتينية"},
      {k:"arabieraz",   n:"العربية أو الأمازيغية",s:"عائلات من المغرب والجزائر وغيرها"},
      {k:"globalak",    n:"الإنجليزية أو الفرنسية أو الألمانية",s:"عائلات دولية"},
      {k:"bestea",      n:"لغة أخرى",s:"الرومانية، الولوف، الصينية وغيرها"},
    ],
    katN:{euskaraz:"في المنزل: باسكية",elebietan:"في المنزل: ثنائي اللغة",gaztelaniaz:"في المنزل: إسبانية",arabieraz:"في المنزل: عربية / أمازيغية",globalak:"في المنزل: إنجليزية / فرنسية / ألمانية",bestea:"في المنزل: لغة أخرى"},
    oh:[
      {s:"ماذا تقيس هذه الأداة؟",t:"تولّد النماذج D وA وG احتمالات مختلفة للوصول إلى مستوى C1 في الباسكية. يفتح C1 مناصب في المسابقات الحكومية (<strong>43.7% من مناصب التعليم في نافارا تشترط الباسكية</strong>، OPE 2019) وكامل سوق العمل في إقليم الباسك. يدفع إقليم الباسك <strong>2,437 أورو/سنة أكثر</strong> من نافارا."},
      {s:"ما هو الراتب المتوقع؟",t:"هو متوسط مرجّح بالاحتمالات: احتمال بلوغ C1 × العلاوة اللغوية × المنطقة الجغرافية."},
      {s:"القيود",t:"هذا نموذج خبراء، وليس انحداراً رسمياً. لا تنشر حكومة نافارا نتائج الامتحانات مصنّفةً حسب النموذج. المصادر: INE EAES 2023 · OPE Maestros Navarra 2019 · Lasagabaster 2003."},
    ],
  },
};

let lang=null, kat=null;

function get(k,e){return DAT.find(r=>r.kategoria===k&&r.eredua===e);}
function fmtS(n){return (Math.round(n/100)*100).toLocaleString();}
function fmtK(n){return Math.round(n/1000);}

function startLang(l){
  lang=l; kat=null;
  const t=TX[l], isRTL=l==='arab';
  document.getElementById('lang-screen').style.display='none';
  const app=document.getElementById('app');
  app.style.display='block';
  app.className=isRTL?'rtl':'';
  document.getElementById('app-h1').textContent=t.h1;
  document.getElementById('app-intro').textContent=t.intro;
  document.getElementById('gal-q').textContent=t.galq;
  document.getElementById('calc-btn').textContent=t.calc;
  document.getElementById('back-btn').textContent=t.back;
  document.getElementById('oh-tit').textContent=t.ohTit;
  document.getElementById('oh-content').innerHTML=t.oh.map(b=>
    `<div class="oh-bloke"><div class="oh-sub">${b.s}</div><div class="oh-txt">${b.t}</div></div>`
  ).join('');
  document.getElementById('calc-btn').disabled=true;
  document.getElementById('galdetegia').style.display='block';
  document.getElementById('emaitza').style.display='none';

  const optsEl=document.getElementById('opts');
  optsEl.innerHTML=t.opts.map(o=>
    `<button class="opt" data-kat="${o.k}">
      ${isRTL
        ?`<span><span class="opt-nom">${o.n}</span><span class="opt-sub">${o.s}</span></span><div class="opt-dot"></div>`
        :`<div class="opt-dot"></div><span><span class="opt-nom">${o.n}</span><span class="opt-sub">${o.s}</span></span>`
      }
    </button>`
  ).join('');

  optsEl.querySelectorAll('.opt').forEach(function(btn){
    btn.addEventListener('click',function(){
      optsEl.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      this.classList.add('sel');
      kat=this.getAttribute('data-kat');
      document.getElementById('calc-btn').disabled=false;
    });
  });
}

function kalkulatu(){
  const t=TX[lang], lN=LNOM[lang];
  const D=get(kat,'D'),A=get(kat,'A'),G=get(kat,'G');
  const maxS=Math.max(D.sol_esperatua,A.sol_esperatua,G.sol_esperatua);
  document.getElementById('galdetegia').style.display='none';
  document.getElementById('emaitza').style.display='block';
  document.getElementById('em-k').textContent=t.emk;
  document.getElementById('em-t').textContent=t.katN[kat];
  document.getElementById('lur-tit').textContent=t.lurTit;
  document.getElementById('reset-btn').textContent=t.reset;

  const eLabels={
    eus:'eredua', es:'modelo', en:'model', arab:'نموذج'
  };
  const eLabel=eLabels[lang]||'';
  document.getElementById('ek3').innerHTML=['D','A','G'].map(e=>{
    const r={D,A,G}[e],top=r.sol_esperatua===maxS;
    return `<div class="ek${top?' top':''}" style="${top?'border-color:'+COL[e]:''}">
      ${top?'<span class="ek-tick">✓</span>':''}
      <div class="ek-e" style="color:${COL[e]}">${e} ${eLabel}</div>
      <div class="ek-sol" style="color:${COL[e]}">${fmtS(r.sol_esperatua)}€</div>
      <div class="ek-any">${t.anyurte}</div>
    </div>`;
  }).join('');

  const dS=D.sol_esperatua-G.sol_esperatua, dV=D.vpn_tot-G.vpn_tot;
  document.getElementById('diff').innerHTML=`
    <div class="diff-num">+${fmtS(dS)}€ / ${lang==='arab'?'سنة':lang==='es'?'año':lang==='en'?'year':'urte'}</div>
    <div class="diff-exp">${t.difexp}<br>${t.difexp2} <strong>+${fmtK(dV)}k€</strong></div>`;

  document.getElementById('lur3').innerHTML=['D','A','G'].map(e=>{
    const r={D,A,G}[e];
    return `<div class="lc">
      <div class="lc-e" style="color:${COL[e]}">${e}</div>
      ${LURS.map(l=>`<div class="lc-row">
        <span class="lc-lur">${lN[l]}</span>
        <span style="color:${COL[e]};font-weight:500;font-family:'IBM Plex Mono',monospace;font-size:0.62rem;">${r.lur_ban[l]}%</span>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function goBack(){
  document.getElementById('lang-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  lang=null; kat=null;
}

function berriz(){
  kat=null;
  document.getElementById('galdetegia').style.display='block';
  document.getElementById('emaitza').style.display='none';
  document.getElementById('opts').querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  document.getElementById('calc-btn').disabled=true;
}

// Event listeners — DOMContentLoaded
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('btn-eus').addEventListener('click',function(){startLang('eus');});
  document.getElementById('btn-es').addEventListener('click',function(){startLang('es');});
  document.getElementById('btn-en').addEventListener('click',function(){startLang('en');});
  document.getElementById('btn-arab').addEventListener('click',function(){startLang('arab');});
  document.getElementById('back-btn').addEventListener('click',goBack);
  document.getElementById('calc-btn').addEventListener('click',kalkulatu);
  document.getElementById('reset-btn').addEventListener('click',berriz);
});
</script>
</body>
</html>
